<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Candlestick 1 (bearish, red) -->
  <line x1="14" y1="12" x2="14" y2="18" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <rect x="10" y="18" width="8" height="14" rx="1.5" fill="#ef4444"/>
  <line x1="14" y1="32" x2="14" y2="38" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 2 (bullish, green) -->
  <line x1="28" y1="16" x2="28" y2="22" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <rect x="24" y="22" width="8" height="18" rx="1.5" fill="#22c55e"/>
  <line x1="28" y1="40" x2="28" y2="46" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 3 (bullish, green) -->
  <line x1="42" y1="10" x2="42" y2="16" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <rect x="38" y="16" width="8" height="20" rx="1.5" fill="#22c55e"/>
  <line x1="42" y1="36" x2="42" y2="44" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>

  <!-- Trend line -->
  <polyline points="8,50 22,44 36,40 56,30" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2"/>

  <!-- "K" letter -->
  <text x="48" y="62" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#38bdf8">K</text>
</svg>
